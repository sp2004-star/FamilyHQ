services:
  - type: web
    name: familyhq
    runtime: node
    plan: free
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://familyhq.onrender.com
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: familyhq-db
          property: connectionString
    healthCheckPath: /api/health

databases:
  - name: familyhq-db
    plan: free
    databaseName: familyhq
    user: familyhq_user
